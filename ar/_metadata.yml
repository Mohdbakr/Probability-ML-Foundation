lang: ar
dir: rtl
include-after-body:
  text: |
    <script>
    (function () {
      var textMap = {
        'Home':    'الرئيسية',
        'About':   'نبذة',
        'Blog':    'المقالات',
        'Projects': 'المشاريع'
      };

      // English absolute path → Arabic absolute path.
      // Only pages that actually have Arabic equivalents are listed here.
      // Using absolute paths (resolved via URL API) works at any directory depth.
      var enToAr = {
        '/':                  '/ar/',
        '/index.html':        '/ar/',
        '/about.html':        '/ar/about.html',
        '/posts/':            '/ar/posts/',
        '/posts/index.html':  '/ar/posts/',
        '/projects.html':      '/ar/projects.html'
      };

      var current = window.location.pathname.replace(/\/$/, '') || '/';

      document.querySelectorAll('.navbar-nav .nav-link').forEach(function (el) {
        // Language toggle is the compact icon-only item — skip it
        if (el.closest('.nav-item.compact')) return;

        // Quarto's active detection runs against English hrefs, which never match
        // /ar/* URLs — reset it so we can assign it correctly below.
        el.classList.remove('active');

        // Translate nav text
        var label = el.querySelector('.menu-text');
        if (label && textMap[label.textContent.trim()]) {
          label.textContent = textMap[label.textContent.trim()];
        }

        // Remap English nav href → Arabic equivalent, then mark active if it
        // matches the current page URL.
        var href = el.getAttribute('href');
        if (!href || href.charAt(0) === '#') return;
        try {
          var absPath = new URL(href, window.location.href).pathname;
          var newHref = null;
          if (enToAr[absPath]) {
            newHref = enToAr[absPath];
          } else if (/^\/posts\//.test(absPath)) {
            newHref = '/ar' + absPath;
          }
          if (newHref) {
            el.setAttribute('href', newHref);
            var newPath = new URL(newHref, window.location.href).pathname.replace(/\/$/, '') || '/';
            if (newPath === current) {
              el.classList.add('active');
            }
          }
        } catch (e) {}
      });
    })();
    </script>
